name: Apply KAI D1 migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Cloudflare secrets
        run: |
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "Missing Cloudflare account ID. Add CLOUDFLARE_ACCOUNT_ID as a GitHub Actions repository secret or variable."
            exit 1
          fi
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "Missing Cloudflare API token. Add CLOUDFLARE_API_TOKEN as a GitHub Actions repository secret or variable."
            exit 1
          fi
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID || secrets.cloudflare_id || vars.cloudflare_id || secrets.CLOUDFLARE_ID || vars.CLOUDFLARE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN || secrets.cloudflare_token_api || vars.cloudflare_token_api || secrets.CLOUDFLARE_TOKEN_API || vars.CLOUDFLARE_TOKEN_API }}

      - name: Apply D1 migrations
        run: npx wrangler d1 migrations apply kai-db --remote
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || vars.CLOUDFLARE_ACCOUNT_ID || secrets.cloudflare_id || vars.cloudflare_id || secrets.CLOUDFLARE_ID || vars.CLOUDFLARE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN || vars.CLOUDFLARE_API_TOKEN || secrets.cloudflare_token_api || vars.cloudflare_token_api || secrets.CLOUDFLARE_TOKEN_API || vars.CLOUDFLARE_TOKEN_API }}
