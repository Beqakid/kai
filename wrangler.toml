name = "kai"
main = "packages/kai-cloudflare/src/worker.ts"
compatibility_date = "2026-05-17"

[vars]
AI_COACH_ENABLED = "true"
AI_COACH_VOICE_ENABLED = "false"
AI_COACH_WAKEWORD_ENABLED = "false"
AI_COACH_MULTILINGUAL = "true"
AI_COACH_INTERVIEW_MODE = "false"
AI_COACH_ADAPTIVE_LEARNING = "false"
AI_COACH_AGENT_MODE = "false"
AI_COACH_SUPPORT_ESCALATION = "false"
KAI_DEFAULT_LANGUAGE = "en"
KAI_DEFAULT_AUTONOMY = "GUIDE_ONLY"
KAI_ALLOWED_ORIGINS = "https://kai.jjioji.workers.dev,https://viliniu.com,https://www.viliniu.com,https://viliniu-landing.pages.dev,https://shop.viliniu.com,https://viliniu-storefront.pages.dev,https://vendor.viliniu.com,https://viliniu-vendor.pages.dev,https://admin.viliniu.com,https://viliniu-admin.pages.dev,https://delivery.viliniu.com,https://viliniu-delivery.pages.dev"

[[d1_databases]]
binding = "KAI_DB"
database_name = "kai-db"
database_id = "c00f52df-b774-45d2-b39d-1f1666dc3844"

